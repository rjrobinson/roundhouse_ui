name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required for RubyGems trusted publishing (OIDC)

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build and push to RubyGems
        uses: rubygems/release-gem@v1
